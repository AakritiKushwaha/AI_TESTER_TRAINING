# Rest Assured API Testing Framework Configuration
# Environment-specific and common settings

# Base URI Configuration
base.uri=https://restful-booker.herokuapp.com
base.path=

# Timeout Configuration (in milliseconds)
connection.timeout=5000
read.timeout=5000

# Content Type Configuration
content.type=application/json

# Authentication Configuration
api.username=admin
api.password=password123

# Logging Configuration
logging.enabled=true

# Allure Reporting Configuration
allure.reporting.enabled=true

# Environment Configuration (DEV, STAGE, PROD)
environment=DEV
